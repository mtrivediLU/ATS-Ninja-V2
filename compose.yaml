# ATS-Ninja-V2 local development topology.
#
# Runs the async kit lifecycle: PostgreSQL (persistence), Redis (Celery broker),
# a one-shot migration step, the FastAPI API, the Celery worker, and the web
# frontend. Authentication, billing, and product frontend flows are out of scope.
#
# The API image is built once (by the `api` service) and reused by `migrate`
# and `worker` via the shared image tag.
name: ats-ninja-v2

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ats
      POSTGRES_PASSWORD: ats
      POSTGRES_DB: ats_ninja
    ports:
      - "5432:5432"
    volumes:
      - ats_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats -d ats_ninja"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot schema migration. Runs to completion, then api/worker start.
  migrate:
    image: ats-ninja-v2/api:dev
    command: ["alembic", "upgrade", "head"]
    environment:
      ATS_API_DATABASE_URL: postgresql+asyncpg://ats:ats@db:5432/ats_ninja
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    image: ats-ninja-v2/api:dev
    environment:
      ATS_API_ENVIRONMENT: development
      ATS_API_CORS_ORIGINS: '["http://localhost:3000"]'
      ATS_API_DATABASE_URL: postgresql+asyncpg://ats:ats@db:5432/ats_ninja
      ATS_API_REDIS_URL: redis://redis:6379
      # Ollama is optional; the engine degrades to a deterministic path.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    image: ats-ninja-v2/api:dev
    command: ["celery", "-A", "app.tasks", "worker", "--loglevel=info", "-Q", "kits"]
    environment:
      ATS_API_DATABASE_URL: postgresql+asyncpg://ats:ats@db:5432/ats_ninja
      ATS_API_REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - require('http').get('http://localhost:3000',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ats_pgdata:
